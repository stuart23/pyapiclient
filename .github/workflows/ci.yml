name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run tests with coverage
        run: >
          pytest -q
          --cov=dynamicapiclient
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: py${{ matrix.python-version }}
          name: Python-${{ matrix.python-version }}
          fail_ci_if_error: true

  integration-airflow:
    # Manual run from Actions, or PR to main with the integration_test label (GitHub label, not a git tag).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'integration_test'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[dev]"

      - name: Start Airflow (OpenAPI target)
        run: docker compose -f docker-compose.airflow.yml up -d --wait

      - name: Run Airflow integration tests
        env:
          RUN_AIRFLOW_INTEGRATION: "1"
          AIRFLOW_ORIGIN: "http://127.0.0.1:8080"
        run: >
          pytest tests/integration
          -q
          --no-cov
          --override-ini addopts=-q

      - name: Stop Airflow
        if: always()
        run: docker compose -f docker-compose.airflow.yml down -v
